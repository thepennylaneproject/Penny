[build]
command = "turbo run build --filter penny-dashboard"
publish = "apps/dashboard/.next"

[build.environment]
# Sentry DSNs are intentionally public (embedded in browser bundles).
# Omit them from secrets scanning so the build doesn't fail when they
# are set as Netlify env vars.
# NEXT_PUBLIC_* Supabase keys are intentionally embedded in the browser bundle
# (anon key is protected by RLS; URL is required for client-side queries).
# Sentry DSNs are intentionally public.
SECRETS_SCAN_OMIT_KEYS = "SENTRY_DSN,NEXT_PUBLIC_SENTRY_DSN,PENNY_SENTRY_DSN,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY"

[[plugins]]
package = "@netlify/plugin-nextjs"

[[headers]]
for = "/_next/static/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
